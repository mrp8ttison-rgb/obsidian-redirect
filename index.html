<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening Obsidian…</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    text-align: center;
    padding: 3em 1.5em;
    background: #1a1a2e;
    color: #e0e0e0;
  }
  p { color: #999; margin: 1.5em 0; }
  a.btn {
    display: inline-block;
    padding: 1em 2em;
    background: #7c3aed;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 1.1em;
    font-weight: 500;
  }
  a.btn:active { background: #6d28d9; }
</style>
</head>
<body>
<p>Opening Obsidian…</p>
<div id="action"></div>
<script>
  var vault = new URLSearchParams(window.location.search).get('vault') || 'Brains Remote';
  var uri = 'obsidian://open?vault=' + encodeURIComponent(vault);
  document.getElementById('action').innerHTML = '<a class="btn" href="' + uri + '">Open Vault</a>';
  window.location.href = uri;
</script>
</body>
</html>
