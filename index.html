<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening in Obsidian…</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    text-align: center;
    padding: 3em 1.5em;
    background: #1a1a2e;
    color: #e0e0e0;
  }
  h2 { font-weight: 500; margin-bottom: 0.5em; }
  p { color: #999; margin-bottom: 1.5em; }
  .note-name {
    color: #a78bfa; font-size: 1.1em; font-weight: 600;
    margin: 0.8em 0;
  }
  .path {
    color: #666; font-family: monospace; font-size: 0.75em;
    word-break: break-all; margin-bottom: 1.5em;
  }
  a.btn {
    display: inline-block;
    padding: 1em 2em;
    background: #7c3aed;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 1.1em;
    font-weight: 500;
    margin: 0.5em;
  }
  a.btn:active { background: #6d28d9; }
  .error { color: #f87171; margin-top: 2em; }
</style>
</head>
<body>
<h2>Opening in Obsidian…</h2>
<div id="action"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  const vault = params.get('vault');
  const file = params.get('file');

  if (!vault || !file) {
    document.getElementById('action').innerHTML = '<p class="error">Missing vault or file parameter.</p>';
  } else {
    const decoded = decodeURIComponent(file);
    const noteName = decoded.split('/').pop();

    // Use obsidian://adv-uri (new scheme, v1.44.0+, single encoding)
    // filepath needs %2F for slashes, %20 for spaces
    const advUri = 'obsidian://adv-uri?vault=' + encodeURIComponent(vault)
      + '&filepath=' + encodeURIComponent(decoded);

    let html = '';
    html += '<p class="note-name">' + noteName + '</p>';
    html += '<p class="path">' + decoded + '</p>';
    html += '<a class="btn" href="' + advUri + '">Open in Obsidian</a>';
    document.getElementById('action').innerHTML = html;

    // Auto-redirect
    window.location.href = advUri;
  }
</script>
</body>
</html>
