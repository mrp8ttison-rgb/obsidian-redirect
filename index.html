<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening in Obsidian…</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    text-align: center;
    padding: 3em 1.5em;
    background: #1a1a2e;
    color: #e0e0e0;
  }
  h2 { font-weight: 500; margin-bottom: 0.5em; }
  p { color: #999; margin-bottom: 1.5em; }
  .path {
    color: #a78bfa; font-family: monospace; font-size: 0.85em;
    word-break: break-all; margin-bottom: 2em;
  }
  a.btn {
    display: inline-block;
    padding: 1em 2em;
    background: #7c3aed;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 1.1em;
    font-weight: 500;
    margin: 0.5em;
  }
  a.btn:active { background: #6d28d9; }
  a.btn.secondary { background: #374151; }
  a.btn.secondary:active { background: #4b5563; }
  .error { color: #f87171; margin-top: 2em; }
</style>
</head>
<body>
<h2>Opening in Obsidian…</h2>
<p>If the note didn't open automatically, tap a button below.</p>
<div id="action"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  const vault = params.get('vault');
  const file = params.get('file');

  if (!vault) {
    document.getElementById('action').innerHTML = '<p class="error">Missing vault parameter.</p>';
  } else {
    // Primary: open file directly
    const openUri = 'obsidian://open?vault=' + encodeURIComponent(vault)
      + (file ? '&file=' + encodeURIComponent(file) : '');

    // Fallback: search for the filename (works better with cold-start bug)
    const filename = file ? file.split('/').pop().replace(/%20/g, ' ') : '';
    const searchUri = 'obsidian://search?vault=' + encodeURIComponent(vault)
      + '&query=' + encodeURIComponent(filename);

    let html = '';
    if (file) {
      html += '<p class="path">' + decodeURIComponent(file).replace(/\//g, ' / ') + '</p>';
    }
    html += '<a class="btn" href="' + openUri + '">Open Note</a>';
    if (file) {
      html += '<a class="btn secondary" href="' + searchUri + '">Search for It</a>';
    }
    document.getElementById('action').innerHTML = html;

    // No auto-redirect — iOS ignores the file param on cold start.
    // Let the user tap the button after Obsidian is already running.
  }
</script>
</body>
</html>
